{% extends 'base.html' %}
{% load static %}
{% block page_title %}Parol O'zgartirish{% endblock %}

{% block content %}
<div class="card-custom" style="max-width: 500px; margin: 0 auto;">
    <h3 style="color: #800A7A; margin-bottom: 25px;">
        <i class="fas fa-key"></i> Parol O'zgartirish — <b>{{ model.username }}</b>
    </h3>

    {% if error %}
    <div style="background: #fdecea; border-left: 4px solid #e74c3c; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; color: #c0392b;">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Yangi parol</label>
            <input type="password" name="password1" class="form-control" placeholder="Kamida 6 belgi" required>
        </div>
        <div class="form-group">
            <label class="form-label">Parolni tasdiqlang</label>
            <input type="password" name="password2" class="form-control" placeholder="Parolni takrorlang" required>
        </div>
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Saqlash</button>
            <a href="{% url 'admin_user_list' %}" class="btn-maxway" style="background: #eee; color: #333;">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
